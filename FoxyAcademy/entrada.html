<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxyAcademy - Bem-vindo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #2c2c2c 0%, #1a1a1a 100%);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        .logo-box {
            width: 300px;
            height: 300px;
            border-radius: 40px;
            object-fit: contain;
            padding: 10px;
            margin: 0 auto 20px;
            display: block;
        }

        h1 {
            color: white;
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .btn-entrar {
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: transparent;
            border: 2px solid #ff4d4d;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-entrar:hover {
            background: #ff4d4d;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.6);
            transform: translateY(-3px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <img src="FoxyStudios/Screenshot_20260421_000325.jpg" alt="FoxyAcademy" class="logo-box">
        <h1>FOXY ACADEMY</h1>
        <p><font color="white"><b>Aprendizado Motivação Foco</b></font></fontMotiva></p>
        <br>
        <a href="index.html" class="btn-entrar">ENTRAR NO SITE</a>
    </div>

</body>
</html>
